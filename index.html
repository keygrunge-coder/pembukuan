<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRF Pembukuan</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="splash"><div class="logo">SRF</div></div>
    
    <div id="app">
        <header>
            <button id="menuBtn">☰</button>
            <h2 id="pageTitle">Dashboard</h2>
            <button id="searchBtn">🔍</button>
        </header>
        <main id="content">
            <div class="card">
                <h3>Selamat Datang di SRF</h3>
                <p>Sistem Pembukuan Modern.</p>
            </div>
        </main>
        <button id="fab">+</button>
    </div>

    <nav id="drawer">
        <div class="drawer-header"><h2>SRF App</h2></div>
        <button class="menu-item" onclick="app.navigate('dashboard')">Dashboard</button>
        <button class="menu-item" onclick="app.navigate('nota')">Data Nota</button>
    </nav>
    <div id="overlay"></div>

    <script src="app.js"></script>
</body>
</html>
