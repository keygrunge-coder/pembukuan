<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembukuan PWA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="splash"><div class="logo">P</div></div>
    
    <div id="app">
        <header>
            <button id="menuBtn">☰</button>
            <h2 id="pageTitle">Dashboard</h2>
            <button id="searchBtn">🔍</button>
        </header>
        <main id="content">
            <div class="card">
                <h3>Selamat Datang</h3>
                <p>Klik tombol + untuk mulai menambah data nota.</p>
            </div>
        </main>
        <button id="fab">+</button>
    </div>

    <nav id="drawer">
        <div style="padding:20px;"><h3>Menu</h3></div>
        <button class="nav-link" onclick="alert('Dashboard')">Dashboard</button>
        <button class="nav-link" onclick="alert('Laporan')">Laporan</button>
    </nav>
    <div id="overlay"></div>

    <script src="app.js"></script>
</body>
</html>
