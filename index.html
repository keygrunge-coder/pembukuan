<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Pembukuan</title>

<meta name="theme-color" content="#2563eb">

<link rel="manifest" href="manifest.json">

<link
rel="apple-touch-icon"
href="icons/icon-192.png">

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div id="app">

<!-- Splash -->

<div id="splash">

<div class="logo">

📒

</div>

<h1>Pembukuan</h1>

<p>Loading...</p>

</div>

<!-- Sidebar -->

<aside id="drawer">

<div class="drawer-header">

<h2>Pembukuan</h2>

</div>

<button data-page="dashboard">
Dashboard
</button>

<button data-page="nota">
Nota
</button>

<button data-page="transfer">
Transfer
</button>

<button data-page="laporan">
Laporan
</button>

<button data-page="backup">
Backup
</button>

<button data-page="setting">
Pengaturan
</button>

</aside>

<!-- Overlay -->

<div id="overlay"></div>

<!-- Header -->

<header>

<button id="menuBtn">

☰

</button>

<h2 id="pageTitle">

Dashboard

</h2>

<button id="searchBtn">

🔍

</button>

</header>

<!-- Search -->

<section id="searchBar">

<input
type="text"
id="searchInput"
placeholder="Cari nota...">

</section>

<!-- MAIN -->

<main>

<!-- DASHBOARD -->

<section
id="dashboard"
class="page active">

<div class="grid">

<div class="card">

<span>Total Nota</span>

<h2 id="totalNota">

0

</h2>

</div>

<div class="card">

<span>Total Transfer</span>

<h2 id="totalTransfer">

Rp0

</h2>

</div>

<div class="card">

<span>Sisa Tagihan</span>

<h2 id="sisaTagihan">

Rp0

</h2>

</div>

<div class="card">

<span>Sudah Lunas</span>

<h2 id="notaLunas">

0

</h2>

</div>

</div>

<div class="chart-card">

<canvas id="chartCanvas"></canvas>

</div>

<div class="recent-card">

<h3>

Nota Terbaru

</h3>

<div id="recentList">

</div>

</div>

</section>

<!-- NOTA -->

<section
id="nota"
class="page">

<div class="top-action">

<button id="newNota">

+ Nota Baru

</button>

</div>

<div id="notaList">

</div>

</section>

<!-- DETAIL -->

<section
id="detail"
class="page">

<div id="detailContainer">

</div>

</section>

<!-- TRANSFER -->

<section
id="transfer"
class="page">

<div class="top-action">

<button id="newTransfer">

+ Transfer

</button>

</div>

<div id="transferList">

</div>

</section>

<!-- LAPORAN -->

<section
id="laporan"
class="page">

<div class="grid">

<div class="card">

<h3>Hari Ini</h3>

<p id="todayIncome">

Rp0

</p>

</div>

<div class="card">

<h3>Bulan Ini</h3>

<p id="monthIncome">

Rp0

</p>

</div>

</div>

</section>

<!-- BACKUP -->

<section
id="backup"
class="page">

<button id="exportJson">

Export JSON

</button>

<button id="importJson">

Import JSON

</button>

<button id="exportExcel">

Export Excel

</button>

<input
type="file"
id="fileImport"
hidden>

</section>

<!-- SETTING -->

<section
id="setting"
class="page">

<label>

Dark Mode

</label>

<label class="switch">

<input
type="checkbox"
id="darkMode">

<span></span>

</label>

</section>

</main>

<!-- FAB -->

<button id="fab">

+

</button>

<!-- MODAL NOTA -->

<div
id="notaModal"
class="modal">

<div class="modal-content">

<h2>

Nota Baru

</h2>

<input
id="customerName"
placeholder="Nama">

<div
id="items">

</div>

<button id="addItem">

+ Barang

</button>

<div class="summary">

<label>

Grand Total

</label>

<h2 id="grandTotal">

Rp0

</h2>

</div>

<textarea
id="note"
placeholder="Catatan">

</textarea>

<div class="modal-action">

<button id="saveNota">

Simpan

</button>

<button class="close">

Batal

</button>

</div>

</div>

</div>

<!-- MODAL TRANSFER -->

<div
id="transferModal"
class="modal">

<div class="modal-content">

<h2>

Tambah Transfer

</h2>

<select id="transferNota">

</select>

<input
id="transferNominal"
type="number"
placeholder="Nominal">

<input
id="transferDate"
type="date">

<textarea
id="transferNote"
placeholder="Keterangan">

</textarea>

<div class="modal-action">

<button id="saveTransfer">

Simpan

</button>

<button class="close">

Batal

</button>

</div>

</div>

</div>

<!-- Toast -->

<div id="toast"></div>

</div>

<script src="app.js"></script>

</body>

</html>
